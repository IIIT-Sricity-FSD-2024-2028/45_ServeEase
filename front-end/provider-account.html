<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ServeEase | Provider Profile</title>

  <link rel="stylesheet" href="CSS/global.css" />

  <link rel="stylesheet" href="CSS/home.css" />

  <link rel="stylesheet" href="CSS/dashboard.css" />

  <link rel="stylesheet" href="CSS/provider.css" />

</head>

<body>

  <header class="dashboard-topbar provider-topbar">

    <div class="dashboard-brand">

      <div class="brand-icon">SE</div>

      <span>ServeEase</span>

    </div>

    <div class="dashboard-search">

      <input type="text" placeholder="Search profile info..." />

    </div>

    <div class="dashboard-topbar-actions">

      <div class="profile-menu-wrap">

        <button class="profile-btn" type="button" id="providerProfileBtn">👤</button>

        <div class="profile-dropdown hidden" id="providerProfileDropdown">

          <a href="provider-account.html">My Profile</a>

          <a href="provider-dashboard.html">Go to Dashboard</a>

          <button type="button" id="providerLogoutBtn">Logout</button>

        </div>

      </div>

    </div>

  </header>



  <main class="dashboard-page provider-page">

    <div class="container">

      <div class="breadcrumb-row">

        <a href="provider-dashboard.html">Provider Dashboard</a> &nbsp;›&nbsp;

        <strong>My Profile</strong>

      </div>



      <section class="page-title-block provider-page-title">

        <h1>My Profile</h1>

        <p>View your personal, professional, bank, and service profile details.</p>

      </section>



      <section class="provider-profile-layout">

        <div class="panel-card">

          <h2 class="panel-title">Personal Information</h2>

          <div class="info-grid" id="providerPersonalInfo"></div>

        </div>



        <div class="panel-card">

          <h2 class="panel-title">Account Activity</h2>

          <div class="info-grid" id="providerAccountStats"></div>

        </div>

      </section>



      <section class="provider-profile-layout">

        <div class="panel-card">

          <h2 class="panel-title">Professional Information</h2>

          <div class="info-grid" id="providerProfessionalInfo"></div>

        </div>



        <div class="panel-card">

          <h2 class="panel-title">Bank Information</h2>

          <div class="info-grid" id="providerBankInfo"></div>

        </div>

      </section>

    </div>

  </main>



  <script src="JavaScript/provider.js"></script>

  <script src="JavaScript/search.js"></script>

</body>

</html>
