<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServeEase | Login</title>
  <link rel="stylesheet" href="CSS/global.css" />
  <link rel="stylesheet" href="CSS/auth.css" />
</head>
<body>
  <main class="auth-page">
    <div class="auth-wrapper">
      <div class="auth-left">
        <div class="brand auth-brand">
          <div class="brand-icon">SE</div>
          <span>ServeEase</span>
        </div>

        <div class="auth-card">
          <h1>Welcome to ServeEase</h1>
          <p class="auth-subtitle">Login or create an account to continue</p>

          <div class="role-tabs" id="loginRoleTabs">
            <button class="role-tab active" type="button" data-role="customer">Customer</button>
            <button class="role-tab" type="button" data-role="provider">Provider</button>
            <button class="role-tab" type="button" data-role="support">Support</button>
            <button class="role-tab" type="button" data-role="superuser">Superuser</button>
                      </div>

          <form id="loginForm" novalidate>
            <div class="form-group">
              <label for="loginEmail" id="loginEmailLabel">Email</label>
              <input type="email" id="loginEmail" placeholder="Enter your email" />
              <small class="error" id="loginEmailError"></small>
            </div>

            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input type="password" id="loginPassword" placeholder="Enter your password" />
              <small class="error" id="loginPasswordError"></small>
            </div>

            <div class="form-row">
              <label class="checkbox-wrap">
                <input type="checkbox" id="rememberMe" />
                <span>Remember me</span>
              </label>
              <a class="link-text" href="forgot-password.html">Forgot Password?</a>
            </div>

            <small class="error form-error" id="loginFormError"></small>
            <small class="success-message" id="loginSuccess"></small>

            <button class="btn btn-primary btn-full" type="submit">Sign In</button>
          </form>

          <p class="auth-switch" id="authSwitchText">
            Don’t have an account?
            <a href="signup.html" id="signupLink">Sign Up</a>
          </p>

        </div>

        <div class="auth-footer-links">
          <a href="index.html#about-us">About Us</a>
          <a href="index.html#privacy-policy">Privacy Policy</a>
          <a href="index.html#terms-and-conditions">Terms & Conditions</a>
          <a href="customer-support-center.html">Contact Support</a>
          <a href="my-bookings.html">Track Booking</a>
        </div>
      </div>

      <div class="auth-right">
        <div class="promo-image">
          <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=900&q=80" alt="ServeEase service" />
        </div>
        <h2>Book Trusted Home Services Easily</h2>
        <p>Connect with verified professionals for your home service needs.</p>
      </div>
    </div>
  </main>
  <script src="JavaScript/api.js"></script>
  <script src="JavaScript/mockdata.js"></script>
<script src="JavaScript/auth.js"></script>
</body>
</html>
